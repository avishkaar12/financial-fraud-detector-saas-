services:
  - type: web
    name: risk-atlas-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon

    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: DB_SSLMODE
        scope: build,runtime
      - key: AUTH_REQUIRED
        scope: build,runtime
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        scope: build,runtime
      - key: CORS_ORIGINS
        scope: build,runtime
      - key: CORS_ORIGIN_REGEX
        scope: build,runtime
      - key: MAX_DETECT_ROWS
        scope: build,runtime
        value: "50000"
      - key: MAX_SHAP_EXPLANATIONS
        scope: build,runtime
        value: "40"
